book.guide.page1=欢迎来到 TeamLifeBind!\n\n1. 使用 /tlb 或指南针打开大厅菜单。\n2. 点击准备并等待所有玩家就绪。\n3. 比赛开始后，同队玩家共享生命绑定。
book.guide.page2=对局提示:\n\n- 放下队伍床后会建立全队复活点。\n- 一名队友死亡会导致整队被连带淘汰。\n- 在禁复活维度里死亡会直接出局。
book.recipes.title=配方表
book.recipes.author=TeamLifeBind
book.recipes.page1=队伍床配方\n\n上排: 3 个羊毛\n中排: 3 个羊毛\n下排: 3 个木板\n\n结果: 队伍床
book.recipes.page2=大厅工具会自动发放。\n\n如果遗失，可重新进入大厅或使用 /tlb 再次获取。

