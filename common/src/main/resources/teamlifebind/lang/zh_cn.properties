command.help.title=[TLB] 指令说明
command.help.help=/tlb help - 查看所有指令说明
command.help.menu=/tlb menu - 打开控制菜单
command.help.ready=/tlb ready - 玩家准备开始比赛
command.help.unready=/tlb unready - 取消准备
command.help.start=/tlb start - 强制开始比赛
command.help.stop=/tlb stop - 结束当前比赛
command.help.status=/tlb status - 查看当前比赛状态
command.help.teams=/tlb teams <2-32> - 设置队伍数量
command.help.health=/tlb health <ONE_HEART|HALF_ROW|ONE_ROW> - 设置生命预设
command.help.norespawn=/tlb norespawn - 查看死亡不可复活机制状态
command.help.norespawn_toggle=/tlb norespawn on|off - 开启或关闭死亡不可复活机制
command.help.norespawn_add=/tlb norespawn add <namespace:path> - 添加死亡不可复活维度
command.help.norespawn_remove=/tlb norespawn remove <namespace:path> - 移除死亡不可复活维度
command.help.norespawn_clear=/tlb norespawn clear - 清空死亡不可复活维度列表
command.help.setspawn=/tlb setspawn <teamId> - 设置指定队伍的固定出生点
command.help.clearspawns=/tlb clearspawns - 清空所有队伍固定出生点
command.help.reload=/tlb reload - 重载插件配置与语言文件

