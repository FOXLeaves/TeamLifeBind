book.guide.title=Gameplay Guide
book.guide.author=TeamLifeBind
book.guide.page1=Welcome to TeamLifeBind!\n\n1. Open the lobby menu with /tlb or the compass.\n2. Click Ready and wait for everyone.\n3. When the match starts, teammates share one life link.
book.guide.page2=Match tips:\n\n- Place your Team Bed to create a team respawn point.\n- If one teammate dies, the whole team is wiped.\n- In blocked no-respawn dimensions, death means elimination.
book.recipes.title=Recipe Guide
book.recipes.author=TeamLifeBind
book.recipes.page1=Team Bed Recipe\n\nTop row: 3 wool\nMiddle row: 3 wool\nBottom row: 3 planks\n\nResult: Team Bed
book.recipes.page2=Lobby tools are provided automatically.\n\nIf you lose them, use /tlb or re-enter the lobby to get them again.

