name: TeamLifeBind
version: ${version}
main: com.teamlifebind.paper.TeamLifeBindPaperPlugin
api-version: "1.21"
authors:
  - TeamLifeBind
commands:
  tlb:
    description: TeamLifeBind admin command
    usage: /tlb <help|menu|language|lang|ready|unready|start|stop|status|setspawn|clearspawns|teams|health|healthsync|norespawn|reload>
permissions:
  teamlifebind.admin:
    description: Allows managing TeamLifeBind matches.
    default: op
